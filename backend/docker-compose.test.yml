services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stellaryield_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stellaryield_test"]
      interval: 5s
      timeout: 5s
      retries: 5
