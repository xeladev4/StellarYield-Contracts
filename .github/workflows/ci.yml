name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  sdk:
    name: SDK Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Build SDK
        run: npm run build

  backend:
    name: Backend Lint, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install SDK dependencies and build
        working-directory: sdk
        run: |
          npm ci
          npm run build
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Build backend
        run: npm run build
      - name: Run tests
        run: npm run test

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32v1-none
          components: clippy
      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('Cargo.toml', 'soroban-contracts/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
      - name: Build WASM (required by vault_factory contract import)
        run: cargo build --target wasm32-unknown-unknown --release -p single_rwa_vault
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.toml', 'soroban-contracts/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - name: Build WASM (required by vault_factory contract import)
        run: cargo build --target wasm32-unknown-unknown --release -p single_rwa_vault
      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none
      - name: Install system dependencies for stellar-cli
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli
      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('Cargo.toml', 'soroban-contracts/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
      - name: Build single_rwa_vault contract
        working-directory: soroban-contracts/contracts/single_rwa_vault
        run: stellar contract build
      - name: Build vault_factory contract
        working-directory: soroban-contracts/contracts/vault_factory
        run: stellar contract build
      - name: Report WASM sizes
        run: |
          echo "## WASM Contract Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Contract | Size | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|--------|" >> $GITHUB_STEP_SUMMARY
          for wasm in $(find target/wasm32v1-none/release -name "*.wasm" -type f 2>/dev/null); do
            size=$(wc -c < "$wasm" | tr -d ' ')
            name=$(basename "$wasm")
            size_kb=$((size / 1024))
            limit_kb=256
            if [ "$size_kb" -lt "$limit_kb" ]; then
              status="✅ OK (${size_kb}KB / ${limit_kb}KB)"
            else
              status="❌ EXCEEDS LIMIT (${size_kb}KB / ${limit_kb}KB)"
            fi
            echo "| $name | ${size} bytes (${size_kb}KB) | $status |" >> $GITHUB_STEP_SUMMARY
          done
      - name: Check WASM size limits
        run: |
          failed=0
          for wasm in $(find target/wasm32v1-none/release -name "*.wasm" -type f 2>/dev/null); do
            size=$(wc -c < "$wasm" | tr -d ' ')
            name=$(basename "$wasm")
            limit=$((256 * 1024))
            if [ "$size" -gt "$limit" ]; then
              echo "::error::$name exceeds 256KB limit: $size bytes"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [sdk, backend, fmt, clippy, test, build]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          SDK: ${{ needs.sdk.result }}
          BACKEND: ${{ needs.backend.result }}
          FMT: ${{ needs.fmt.result }}
          CLIPPY: ${{ needs.clippy.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
        run: |
          if [ "$SDK" = "success" ] && [ "$BACKEND" = "success" ] && [ "$FMT" = "success" ] && [ "$CLIPPY" = "success" ] && [ "$TEST" = "success" ] && [ "$BUILD" = "success" ]; then
            echo "All checks passed"
          else
            echo "Failed: sdk=$SDK backend=$BACKEND fmt=$FMT clippy=$CLIPPY test=$TEST build=$BUILD"
            exit 1
          fi
